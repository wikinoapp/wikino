services:
  go-app:
    build:
      context: ./go
      dockerfile: ./Dockerfile.dev
    depends_on:
      - caddy
      - postgresql
    volumes:
      - .:/workspace
      - op-config:/home/developer/.config/op
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/go/.cache/go-build
    ports:
      - "4200:8080"
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      - OP_SERVICE_ACCOUNT_TOKEN=${OP_SERVICE_ACCOUNT_TOKEN:-}

  rails-app:
    build:
      context: ./rails
      dockerfile: ./Dockerfile.dev
    depends_on:
      - go-app
    volumes:
      - .:/workspace
      - op-config:/home/developer/.config/op
      - app_gems_data:/usr/local/bundle
    environment:
      - BINDING=0.0.0.0
      - OP_SERVICE_ACCOUNT_TOKEN=${OP_SERVICE_ACCOUNT_TOKEN:-}
    ports:
      - "4201:3000"
    stdin_open: true
    tty: true
    working_dir: /workspace

  caddy:
    image: caddy:2-alpine
    ports:
      - "4203:8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro

  postgresql:
    image: postgres:17.0
    ports:
      - "4204:5432"
    volumes:
      - postgresql17_data:/var/lib/postgresql/data:delegated
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust

  chrome:
    image: selenium/standalone-chromium:136.0.7103.113
    ports:
      - "4205:4444"

volumes:
  app_gems_data:
  go-build-cache:
  go-mod-cache:
  op-config:
  postgresql17_data:
