test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

s3:
  service: S3
  access_key_id: <%= ENV.fetch("WIKINO_S3_ACCESS_KEY_ID") %>
  secret_access_key: <%= ENV.fetch("WIKINO_S3_SECRET_ACCESS_KEY") %>
  bucket: <%= ENV.fetch("WIKINO_S3_BUCKET_NAME") %>
  region: <%= ENV.fetch("WIKINO_S3_REGION") %>
