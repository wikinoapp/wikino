name: Go CI

on:
  push:
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"

env:
  GO_VERSION: "1.25.5"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # TODO: テンプレートが作成されたらコメントアウトを解除する
      # - name: Check templ generate
      #   run: |
      #     make templ-generate
      #     make goimports
      #     git diff --exit-code internal/templates/

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.6.2
          working-directory: go
          args: --config=.golangci.yml ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    env:
      APP_ENV: test
      DATABASE_URL: postgres://postgres@localhost:5432/wikino_test?sslmode=disable
      WIKINO_PORT: "4004"
      WIKINO_DOMAIN: "test.example.com"
      WIKINO_COOKIE_DOMAIN: ".test.example.com"
      WIKINO_SESSION_SECURE: "false"
      WIKINO_SESSION_HTTPONLY: "true"
      WIKINO_RAILS_APP_URL: "http://localhost:3000"
      WIKINO_DISABLE_RATE_LIMIT: "false"

    services:
      postgresql:
        image: postgres:17.0
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: wikino_test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get dependencies
        run: go mod download

      - name: Setup test database
        run: make db-setup-test

      - name: Run tests
        env:
          CI: true
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: make build

      - name: Check binary exists
        run: |
          if [ ! -f bin/server ]; then
            echo "Build failed: binary not found"
            exit 1
          fi
